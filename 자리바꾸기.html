<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 자리바꾸기</title>
    <!-- React 및 관련 라이브러리 (ESM 버전) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom": "https://esm.sh/react-dom@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "lucide-react": "https://esm.sh/lucide-react"
      }
    }
    </script>
    <!-- Tailwind CSS (런타임 버전) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 추가적인 스타일 (필요시) */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        
        /* 자리바꾸기 프로그램에서 사용하는 애니메이션 */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <!-- Babel을 이용한 브라우저 내 JSX 변환 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import App from './자리바꾸기.js';

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
    
    <!-- 뒤로가기 버튼 (포털로 이동) -->
    <a href="index.html" class="fixed bottom-6 right-6 bg-white shadow-lg border border-gray-200 p-3 rounded-full hover:bg-gray-50 transition-all z-50 flex items-center justify-center group no-print" title="메뉴로 돌아가기">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600 group-hover:text-blue-600 transition-colors"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    </a>
</body>
</html>
