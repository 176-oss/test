<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 자리바꾸기</title>
    <!-- 1. 필수 라이브러리 (UMD 방식 - 절대 오류 없는 조합) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. 아이콘 라이브러리 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #root { min-height: 100vh; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root">
        <!-- 초기 로딩 화면 (React가 로드될 때까지 표시) -->
        <div class="flex flex-col items-center justify-center h-screen bg-white">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-16 w-16 mb-4"></div>
            <h2 class="text-xl font-bold text-gray-800">프로그램 준비 중</h2>
            <p class="text-gray-500 mt-2">최초 실행 시 라이브러리 로딩으로 인해 1~3초 정도 소요될 수 있습니다.</p>
        </div>
    </div>

    <!-- 💡 Babel: JSX 코드를 브라우저에서 바로 실행 가능한 형태로 변환 -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        // LucideReact 전역 객체에서 아이콘들을 가져옵니다.
        const { 
            Shuffle, Printer, Pin, PinOff, Users, LayoutGrid, Maximize2, Trash2, 
            ArrowRightLeft, Settings, Save, History, X, Hand, 
            Image: ImageIcon, FileText, Eye, GraduationCap, ChevronRight
        } = LucideReact;

        // html2canvas 및 jsPDF 로더
        const loadScript = (src) => {
          return new Promise((resolve) => {
            if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            document.head.appendChild(script);
          });
        };

        const App = () => {
          // 상태 관리
          const [inputText, setInputText] = useState("1번 홍길동(남)\n2번 김철수(남)\n3번 이영희(여)\n4번 박민수(남)\n5번 정수진(여)\n6번 최동훈(남)\n7번 강지민(여)\n8번 조현우(남)\n9번 윤서연(여)\n10번 장도윤(남)\n11번 임지아(여)\n12번 한우진(남)\n13번 오유나(여)\n14번 서준서(남)\n15번 신하윤(여)\n16번 권민재(남)\n17번 황서진(여)\n18번 송예준(남)\n19번 전은지(여)\n20번 유현수(남)");
          const [rows, setRows] = useState(5);
          const [cols, setCols] = useState(6);
          const [layoutMode, setLayoutMode] = useState('normal'); 
          const [groupRows, setGroupRows] = useState(2);
          const [groupCols, setGroupCols] = useState(2);
          const [grid, setGrid] = useState([]);
          const [fixedSeats, setFixedSeats] = useState({}); 
          const [draggedSeat, setDraggedSeat] = useState(null);
          const [inactiveSeats, setInactiveSeats] = useState({}); 
          const [modal, setModal] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null, onCancel: null });
          const [showAdvanced, setShowAdvanced] = useState(false);
          const [avoidPairs, setAvoidPairs] = useState("");
          const [genderPairing, setGenderPairing] = useState(false);
          const [savedLayouts, setSavedLayouts] = useState([]);
          const [secretSeatsInput, setSecretSeatsInput] = useState("");
          const [prevLayoutText, setPrevLayoutText] = useState("");
          const [isExtracting, setIsExtracting] = useState(false);
          const [isExporting, setIsExporting] = useState(false); 
          const [scriptsLoaded, setScriptsLoaded] = useState(false);
          const [printPerspective, setPrintPerspective] = useState('normal'); 

          useEffect(() => {
            const initialGrid = Array(rows).fill(null).map(() => Array(cols).fill(null));
            setGrid(initialGrid);
            setFixedSeats({}); 
            setInactiveSeats({}); 
          }, [rows, cols]);

          useEffect(() => {
            Promise.all([
              loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
              loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
            ])
            .then(() => setScriptsLoaded(true))
            .catch(err => console.error("Failed to load export scripts:", err));
          }, []);

          const cleanName = (name) => name ? name.replace(/^[0-9]+번?\s*/, '').replace(/\(남\)|\(여\)/g, '').trim() : '';
          const getGender = (name) => {
            if (!name) return null;
            if (name.includes('(남)')) return 'M';
            if (name.includes('(여)')) return 'F';
            return null;
          };

          const getAvoidsList = () => {
            return avoidPairs.split('\n')
              .map(line => line.split(/[,\-]/).map(n => cleanName(n.trim())).filter(n => n))
              .filter(pair => pair.length >= 2);
          };

          const getPrevPairsList = () => {
            if (!prevLayoutText.trim()) return [];
            const pairs = [];
            const lines = prevLayoutText.split('\n');
            const parsedRows = lines.map(line => line.split(/[\t,]/).map(n => cleanName(n.trim())));
            for (let i = 0; i < parsedRows.length; i++) {
              for (let j = 0; j < parsedRows[i].length; j++) {
                const current = parsedRows[i][j];
                if (!current || current === '빈자리') continue;
                if (j + 1 < parsedRows[i].length) {
                  const right = parsedRows[i][j+1];
                  if (right && right !== '빈자리') pairs.push([current, right]);
                }
                if (i + 1 < parsedRows.length) {
                  const down = parsedRows[i+1][j];
                  if (down && down !== '빈자리') pairs.push([current, down]);
                }
              }
            }
            return pairs;
          };

          const checkConflict = (testGrid, r, c, studentName, targetList, mode, gr, gc) => {
            let strict = false, soft = false;
            if (!studentName || targetList.length === 0) return { strict, soft };
            const clean1 = cleanName(studentName);
            for (let i = 0; i < testGrid.length; i++) {
              for (let j = 0; j < testGrid[i].length; j++) {
                if (i === r && j === c) continue;
                const targetName = testGrid[i][j];
                if (!targetName) continue;
                const clean2 = cleanName(targetName);
                const isMatch = targetList.some(pair => pair.includes(clean1) && pair.includes(clean2));
                if (!isMatch) continue;
                let isSameGroup = false;
                if (mode === 'pair') {
                  if (i === r && Math.floor(j / 2) === Math.floor(c / 2)) isSameGroup = true;
                } else if (mode === 'group') {
                  if (Math.floor(i / gr) === Math.floor(r / gr) && Math.floor(j / gc) === Math.floor(c / gc)) isSameGroup = true;
                }
                if (isSameGroup) strict = true;
                if (Math.abs(i - r) <= 1 && Math.abs(j - c) <= 1) soft = true;
              }
            }
            return { strict, soft };
          };

          const showAlert = (title, message) => {
            setModal({ isOpen: true, type: 'alert', title, message, onConfirm: () => setModal(prev => ({...prev, isOpen: false})) });
          };

          const showConfirm = (title, message, onConfirm, onCancel) => {
            setModal({
              isOpen: true, type: 'confirm', title, message,
              onConfirm: () => { onConfirm(); setModal(prev => ({...prev, isOpen: false})); },
              onCancel: () => { if(onCancel) onCancel(); setModal(prev => ({...prev, isOpen: false})); }
            });
          };

          const allNamesOriginal = [...new Set(inputText.split(/[,\n]/).map(n => n.trim()).filter(n => n !== ""))];
          const assignedNamesOriginal = grid.flat().filter(n => n !== null);
          const waitingList = allNamesOriginal.filter(n => !assignedNamesOriginal.includes(n));

          const handleAssign = () => {
            let names = inputText.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
            const uniqueNames = [...new Set(names)];
            const activeSeatCount = (rows * cols) - Object.keys(inactiveSeats).length;
            if (uniqueNames.length > activeSeatCount) {
              showAlert("인원 초과", `자리가 부족합니다!\n(학생수: ${uniqueNames.length}명 / 사용 가능 좌석수: ${activeSeatCount}석)`);
              return;
            }
            const avoids = getAvoidsList();
            const prevPairs = getPrevPairsList(); 
            const secretSeats = {};
            if (secretSeatsInput.trim()) {
              secretSeatsInput.split('\n').forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                  const name = cleanName(parts[0].trim());
                  const posMatch = parts[1].match(/(\d+)[^\d]+(\d+)/); 
                  if (name && posMatch) {
                    const r = parseInt(posMatch[1], 10) - 1, c = parseInt(posMatch[2], 10) - 1;
                    if (r >= 0 && r < rows && c >= 0 && c < cols) secretSeats[name] = { r, c };
                  }
                }
              });
            }
            let bestGrid = null, minViolations = Infinity;
            const MAX_RETRIES = 500;
            for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
              let newGrid = Array(rows).fill(null).map(() => Array(cols).fill(null));
              let remainingNames = [...uniqueNames];
              Object.entries(secretSeats).forEach(([name, pos]) => {
                if (remainingNames.includes(name) && pos.r < rows && pos.c < cols && !inactiveSeats[`${pos.r}-${pos.c}`] && newGrid[pos.r][pos.c] === null) {
                  newGrid[pos.r][pos.c] = name;
                  remainingNames = remainingNames.filter(n => n !== name);
                }
              });
              Object.entries(fixedSeats).forEach(([name, pos]) => {
                if (remainingNames.includes(name) && pos.r < rows && pos.c < cols && !inactiveSeats[`${pos.r}-${pos.c}`] && newGrid[pos.r][pos.c] === null) {
                  newGrid[pos.r][pos.c] = name;
                  remainingNames = remainingNames.filter(n => n !== name);
                }
              });
              remainingNames.sort(() => Math.random() - 0.5);
              for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                  if (newGrid[r][c] === null && !inactiveSeats[`${r}-${c}`] && remainingNames.length > 0) newGrid[r][c] = remainingNames.pop();
                }
              }
              let violations = 0;
              for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                  const studentA = newGrid[r][c];
                  if (!studentA) continue;
                  const avoidConflict = checkConflict(newGrid, r, c, studentA, avoids, layoutMode, groupRows, groupCols);
                  if (avoidConflict.strict) violations += 10000;
                  if (avoidConflict.soft) violations += 100;
                  const prevConflict = checkConflict(newGrid, r, c, studentA, prevPairs, layoutMode, groupRows, groupCols);
                  if (prevConflict.strict) violations += 500; 
                  if (prevConflict.soft) violations += 5;     
                  if (genderPairing && layoutMode === 'pair' && c % 2 === 0 && c < cols - 1) {
                    const partner = newGrid[r][c+1];
                    if (partner) {
                      const gA = getGender(studentA), gB = getGender(partner);
                      if (gA && gB && gA === gB) violations += 10;
                    }
                  }
                }
              }
              if (violations === 0) { bestGrid = newGrid; minViolations = 0; break; }
              if (violations < minViolations) { minViolations = violations; bestGrid = newGrid; }
            }
            setGrid(bestGrid);
            if (minViolations >= 10000) showAlert("⚠️ 배치 알림", "공간이 부족하여 '강제 기피 대상'을 완벽히 분리하지 못했습니다.");
            else if (minViolations >= 500) showAlert("💡 배치 알림", "강제 기피 대상은 분리되었으나 이전 짝꿍 중 일부가 재배치되었습니다.");
          };

          const handleClear = () => {
            showConfirm("전체 비우기", "모든 자리를 비우시겠습니까?", () => {
              const emptyGrid = Array(rows).fill(null).map(() => Array(cols).fill(null));
              Object.entries(fixedSeats).forEach(([name, pos]) => {
                if (pos.r < rows && pos.c < cols && !inactiveSeats[`${pos.r}-${pos.c}`]) emptyGrid[pos.r][pos.c] = name;
              });
              setGrid(emptyGrid);
            });
          };

          const toggleFixed = (r, c, name) => {
            if (!name) return;
            setFixedSeats(prev => {
              const newFixed = { ...prev };
              if (newFixed[name]) delete newFixed[name]; 
              else {
                Object.keys(newFixed).forEach(key => { if(newFixed[key].r === r && newFixed[key].c === c) delete newFixed[key]; });
                newFixed[name] = { r, c };
              }
              return newFixed;
            });
          };

          const toggleInactive = (r, c) => {
            if (grid[r][c] !== null) return;
            setInactiveSeats(prev => {
              const next = { ...prev };
              if (next[`${r}-${c}`]) delete next[`${r}-${c}`];
              else next[`${r}-${c}`] = true;
              return next;
            });
          };

          const onDragStartFromGrid = (e, r, c, name) => { setDraggedSeat({ source: 'grid', r, c, name }); e.dataTransfer.effectAllowed = "move"; };
          const onDragStartFromWaiting = (e, name) => { setDraggedSeat({ source: 'waiting', name }); e.dataTransfer.effectAllowed = "move"; };
          const onDragOverGrid = (e, r, c) => { if (inactiveSeats[`${r}-${c}`]) return; e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
          const onDragOverWaiting = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };

          const onDropToGrid = (e, targetR, targetC) => {
            e.preventDefault();
            if (!draggedSeat || inactiveSeats[`${targetR}-${targetC}`]) return;
            const newGrid = [...grid.map(row => [...row])];
            const avoids = getAvoidsList(), prevPairs = getPrevPairsList(); 
            let proposedFixedSeats = { ...fixedSeats }, hasAvoidConflict = false, hasPrevConflict = false;

            if (draggedSeat.source === 'grid') {
              const sourceR = draggedSeat.r, sourceC = draggedSeat.c;
              if (sourceR === targetR && sourceC === targetC) { setDraggedSeat(null); return; }
              const temp = newGrid[sourceR][sourceC];
              newGrid[sourceR][sourceC] = newGrid[targetR][targetC];
              newGrid[targetR][targetC] = temp;
              const avoidC1 = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], avoids, layoutMode, groupRows, groupCols);
              const avoidC2 = checkConflict(newGrid, sourceR, sourceC, newGrid[sourceR][sourceC], avoids, layoutMode, groupRows, groupCols);
              if (avoidC1.strict || avoidC1.soft || avoidC2.strict || avoidC2.soft) hasAvoidConflict = true;
              const prevC1 = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], prevPairs, layoutMode, groupRows, groupCols);
              const prevC2 = checkConflict(newGrid, sourceR, sourceC, newGrid[sourceR][sourceC], prevPairs, layoutMode, groupRows, groupCols);
              if (prevC1.strict || prevC2.strict) hasPrevConflict = true;
              const nameA = newGrid[sourceR][sourceC], nameB = newGrid[targetR][targetC];
              if(nameA && proposedFixedSeats[nameA]) proposedFixedSeats[nameA] = { r: sourceR, c: sourceC };
              if(nameB && proposedFixedSeats[nameB]) proposedFixedSeats[nameB] = { r: targetR, c: targetC };
            } else {
              newGrid[targetR][targetC] = draggedSeat.name;
              const avoidC = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], avoids, layoutMode, groupRows, groupCols);
              if (avoidC.strict || avoidC.soft) hasAvoidConflict = true;
              const prevC = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], prevPairs, layoutMode, groupRows, groupCols);
              if (prevC.strict) hasPrevConflict = true;
            }

            const applyChanges = () => { setGrid(newGrid); setFixedSeats(proposedFixedSeats); setDraggedSeat(null); };
            if (hasAvoidConflict) showConfirm("⚠️ 배치 불가 주의!", "기피 대상과 인접하게 됩니다. 그래도 배치하시겠습니까?", applyChanges, () => setDraggedSeat(null));
            else if (hasPrevConflict) showConfirm("💡 이전 자리 중복", "이전 자리에서 인접했던 학생입니다. 그래도 배치하시겠습니까?", applyChanges, () => setDraggedSeat(null));
            else applyChanges();
          };

          const onDropToWaitingList = (e) => {
            e.preventDefault();
            if (!draggedSeat || draggedSeat.source === 'waiting') return;
            const newGrid = [...grid.map(row => [...row])];
            newGrid[draggedSeat.r][draggedSeat.c] = null;
            setGrid(newGrid);
            setFixedSeats(prev => { const newFixed = {...prev}; delete newFixed[draggedSeat.name]; return newFixed; });
            setDraggedSeat(null);
          };

          const handleCopyCurrentToPrev = () => {
            const text = grid.map((row, r) => row.map((name, c) => name ? cleanName(name) : (inactiveSeats[`${r}-${c}`] ? "제외" : "빈자리")).join('\t')).join('\n');
            setPrevLayoutText(text); showAlert("적용 완료", "현재 배치가 이전 자리 배치표로 복사되었습니다.");
          };

          const fetchWithRetry = async (url, options) => {
            const delays = [1000, 2000, 4000];
            for (let i = 0; i <= delays.length; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error("HTTP " + response.status);
                return await response.json();
              } catch (e) { if (i === delays.length) throw e; await new Promise(r => setTimeout(r, delays[i])); }
            }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0]; if (!file) return;
            setIsExtracting(true);
            const reader = new FileReader();
            reader.onloadend = async () => {
              const base64Data = reader.result;
              const apiKey = ""; // API Key if needed
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
              const payload = { contents: [{ role: "user", parts: [{ text: "이 배치도의 이름을 추출해서 탭으로 구분된 텍스트로 변환해줘." }, { inlineData: { mimeType: file.type, data: base64Data.split(',')[1] } }] }] };
              try {
                const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) { setPrevLayoutText(text.replace(/```[a-zA-Z]*\n?/g, '').trim()); showAlert("추출 완료", "성공적으로 추출되었습니다."); }
              } catch (err) { showAlert("추출 실패", "오류가 발생했습니다."); } finally { setIsExtracting(false); }
            };
            reader.readAsDataURL(file); e.target.value = ''; 
          };

          const handlePrintClick = () => {
            if (!scriptsLoaded) { showAlert("로딩 중", "잠시만 기다려 주세요."); return; }
            setModal({ isOpen: true, type: 'export', title: '💾 배치도 저장 및 인쇄', message: '형식을 선택해 주세요.', onCancel: () => setModal(prev => ({...prev, isOpen: false})) });
          };

          const handleExport = async (format) => {
            const element = document.getElementById('capture-area');
            if (!element) return;
            setIsExporting(true);
            const hideElements = element.querySelectorAll('.no-print'), originalDisplays = [];
            hideElements.forEach(el => { originalDisplays.push(el.style.display); el.style.display = 'none'; });
            try {
              const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
              const imgData = canvas.toDataURL('image/png');
              if (format === 'image') {
                const link = document.createElement('a'); link.download = `자리배치도.png`; link.href = imgData; link.click();
              } else {
                const pdf = new window.jspdf.jsPDF({ orientation: canvas.width > canvas.height ? 'l' : 'p', unit: 'px', format: [canvas.width, canvas.height] });
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height); pdf.save(`자리배치도.pdf`);
              }
              setModal(prev => ({...prev, isOpen: false}));
            } catch (err) { showAlert("저장 실패", "오류가 발생했습니다."); } finally {
              hideElements.forEach((el, idx) => el.style.display = originalDisplays[idx]);
              setIsExporting(false);
            }
          };
          
          const saveCurrentLayout = () => {
            const time = new Date().toLocaleTimeString('ko-KR');
            setSavedLayouts(prev => [{ time, grid: grid.map(r => [...r]), fixedSeats: {...fixedSeats}, inactiveSeats: {...inactiveSeats}, secretSeatsInput }, ...prev].slice(0, 5));
            showAlert("저장 완료", "현재 배치가 기록되었습니다.");
          };
          
          const loadLayout = (savedObj) => {
            showConfirm("기록 불러오기", `[${savedObj.time}] 배치를 불러오시겠습니까?`, () => {
              setGrid(savedObj.grid.map(r => [...r])); setFixedSeats(savedObj.fixedSeats); setInactiveSeats(savedObj.inactiveSeats || {}); setSecretSeatsInput(savedObj.secretSeatsInput || "");
            });
          };

          const renderRows = printPerspective === 'teacher' ? [...Array(rows)].map((_, i) => rows - 1 - i) : [...Array(rows)].map((_, i) => i);
          const renderCols = printPerspective === 'teacher' ? [...Array(cols)].map((_, i) => cols - 1 - i) : [...Array(cols)].map((_, i) => i);

          const getSeatMarginClass = (vr, vc) => {
            let classes = "transition-all ";
            if (layoutMode === 'pair' && vc % 2 === 1 && vc !== cols - 1) classes += "mr-6 sm:mr-10 ";
            else if (layoutMode === 'group') {
              if (vc % groupCols === groupCols - 1 && vc !== cols - 1) classes += "mr-6 sm:mr-10 ";
              if (vr % groupRows === groupRows - 1 && vr !== rows - 1) classes += "mb-6 sm:mb-10 ";
            }
            return classes;
          };

          return (
            <div className="h-screen bg-gray-50 flex flex-col md:flex-row text-gray-800 font-sans overflow-hidden">
              <style dangerouslySetInnerHTML={{__html: `@media print { .no-print { display: none !important; } .seat-box { border: 1px solid #000; shadow: none; } @page { size: landscape; margin: 1cm; } }`}} />
              <div className="no-print w-full md:w-80 bg-white border-r border-gray-200 flex flex-col shadow-lg z-10 flex-shrink-0 h-full">
                <div className="p-5 overflow-y-auto flex-1 flex flex-col">
                  <div className="flex items-center gap-2 mb-6 cursor-pointer group w-fit" onClick={() => setShowAdvanced(true)}>
                    <div className="p-1.5 bg-gray-100 text-gray-600 rounded-lg group-hover:bg-blue-100 group-hover:text-blue-600"><Users className="w-6 h-6" /></div>
                    <h1 className="text-xl font-extrabold text-gray-900 group-hover:text-blue-600 transition-colors">스마트 자리배치</h1>
                    <Settings className="w-4 h-4 text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity ml-1" />
                  </div>
                  <div className="mb-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <h2 className="text-sm font-semibold text-gray-700 mb-3">교실 크기</h2>
                    <div className="flex gap-4">
                      <div className="flex-1">
                        <label className="text-xs text-gray-500 block mb-1">행</label>
                        <input type="number" value={rows} onChange={(e) => setRows(Number(e.target.value))} className="w-full border border-gray-300 rounded p-2 text-center" />
                      </div>
                      <div className="flex-1">
                        <label className="text-xs text-gray-500 block mb-1">열</label>
                        <input type="number" value={cols} onChange={(e) => setCols(Number(e.target.value))} className="w-full border border-gray-300 rounded p-2 text-center" />
                      </div>
                    </div>
                  </div>
                  <div className="mb-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <h2 className="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-1.5"><Eye className="w-4 h-4"/> 교탁 보는 시점</h2>
                    <div className="flex gap-2">
                      <button onClick={() => setPrintPerspective('normal')} className={`flex-1 py-2 text-[11px] font-bold rounded-lg border ${printPerspective === 'normal' ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-white text-gray-600'}`}>⬆️ 기본</button>
                      <button onClick={() => setPrintPerspective('teacher')} className={`flex-1 py-2 text-[11px] font-bold rounded-lg border ${printPerspective === 'teacher' ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-white text-gray-600'}`}>⬇️ 반전</button>
                    </div>
                  </div>
                  <div className="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <h2 className="text-sm font-semibold text-gray-700 mb-3">배치 모드</h2>
                    <div className="grid grid-cols-4 gap-1.5">
                      <button onClick={() => setLayoutMode('normal')} className={`p-2 border rounded-lg ${layoutMode === 'normal' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-300'}`}><LayoutGrid className="w-4 h-4 mx-auto mb-1"/><span className="text-[10px] block font-bold">기본</span></button>
                      <button onClick={() => setLayoutMode('pair')} className={`p-2 border rounded-lg ${layoutMode === 'pair' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-300'}`}><ArrowRightLeft className="w-4 h-4 mx-auto mb-1"/><span className="text-[10px] block font-bold">짝꿍</span></button>
                      <button onClick={() => setLayoutMode('group')} className={`p-2 border rounded-lg ${layoutMode === 'group' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-300'}`}><Maximize2 className="w-4 h-4 mx-auto mb-1"/><span className="text-[10px] block font-bold">모둠</span></button>
                      <button onClick={() => setLayoutMode('manual')} className={`p-2 border rounded-lg ${layoutMode === 'manual' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-300'}`}><Hand className="w-4 h-4 mx-auto mb-1"/><span className="text-[10px] block font-bold">직접</span></button>
                    </div>
                  </div>
                  <div className="mb-6 flex-1 flex flex-col min-h-[160px]">
                    <h2 className="text-sm font-semibold text-gray-700 mb-2">학생 명단 ({inputText.split(/[,\n]/).filter(n => n.trim()).length}명)</h2>
                    <textarea className="w-full flex-1 border border-gray-300 rounded-lg p-3 text-sm resize-none" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="이름 입력 (엔터 구분)" />
                  </div>
                  <div className="flex flex-col gap-2 pt-2 border-t border-gray-100">
                    <button onClick={handleAssign} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-md"><Shuffle className="w-5 h-5" />자리 섞기</button>
                    <div className="flex gap-2">
                      <button onClick={handleClear} className="flex-1 bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2 rounded-lg flex items-center justify-center gap-1.5 transition-colors text-sm"><Trash2 className="w-4 h-4" />비우기</button>
                      <button onClick={handlePrintClick} className="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 rounded-lg flex items-center justify-center gap-1.5 shadow-md transition-colors text-sm"><Printer className="w-4 h-4" />저장</button>
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex-1 flex flex-col items-center p-4 md:p-8 overflow-auto bg-gray-200">
                <div id="capture-area" className="flex flex-col items-center bg-white p-6 md:p-10 rounded-3xl shadow-sm min-w-max w-full max-w-5xl border border-gray-100 mb-8 transition-all">
                  {printPerspective === 'normal' && <div className="w-full flex justify-center mb-8"><div className="bg-gray-800 text-white px-16 py-3 rounded-b-3xl shadow-lg text-lg font-bold tracking-widest">교 탁</div></div>}
                  <div className="seat-grid inline-grid gap-2 sm:gap-3" style={{ gridTemplateColumns: `repeat(${cols}, max-content)` }}>
                    {renderRows.map((r, vr) => renderCols.map((c, vc) => {
                      const studentName = grid[r] && grid[r][c] ? grid[r][c] : null;
                      const isFixed = studentName && fixedSeats[studentName] && fixedSeats[studentName].r === r && fixedSeats[studentName].c === c;
                      const isInactive = inactiveSeats[`${r}-${c}`];
                      return (
                        <div key={`${r}-${c}`} draggable={!isInactive && !!studentName} onDragStart={(e) => onDragStartFromGrid(e, r, c, studentName)} onDragOver={(e) => onDragOverGrid(e, r, c)} onDrop={(e) => onDropToGrid(e, r, c)} onClick={() => toggleInactive(r, c)}
                          className={`seat-box relative flex flex-col items-center justify-center rounded-xl border-2 transition-all w-[4.5rem] h-[3.5rem] sm:w-[5.5rem] sm:h-[4rem] md:w-[6.5rem] md:h-[4.5rem] lg:w-[7.5rem] lg:h-[5.5rem] flex-shrink-0 ${isInactive ? 'opacity-30 border-dashed border-gray-300' : (studentName ? 'bg-white border-blue-200 hover:border-blue-400 hover:shadow-md cursor-grab active:cursor-grabbing' : 'bg-gray-100 border-dashed border-gray-300 text-gray-400')} ${isFixed ? 'border-amber-400 bg-amber-50' : ''} ${getSeatMarginClass(vr, vc)}`}
                        >
                          {!isInactive && <span className="absolute top-1 left-2 text-[9px] text-gray-400 no-print select-none">{r+1}-{c+1}</span>}
                          {!isInactive && studentName && <button onClick={(e) => { e.stopPropagation(); toggleFixed(r, c, studentName); }} className={`absolute top-1 right-1 p-1 rounded-full no-print ${isFixed ? 'text-amber-600' : 'text-gray-300'}`}>{isFixed ? <Pin className="w-3.5 h-3.5 fill-current" /> : <PinOff className="w-3 h-3" />}</button>}
                          <div className="font-bold text-gray-800 text-center px-1 select-none w-full truncate" style={{ fontSize: 'clamp(0.75rem, 1.2vw, 1.1rem)' }}>{isInactive ? <span className="text-xl opacity-60 no-print">❌</span> : (studentName ? cleanName(studentName) : <span className="text-gray-300 text-xs">빈 자리</span>)}</div>
                        </div>
                      );
                    }))}
                  </div>
                  {printPerspective === 'teacher' && <div className="w-full flex justify-center mt-8"><div className="bg-gray-800 text-white px-16 py-3 rounded-t-3xl shadow-lg text-lg font-bold tracking-widest">교 탁</div></div>}
                </div>
                {(layoutMode === 'manual' || waitingList.length > 0) && (
                  <div className="no-print w-full max-w-4xl bg-white p-5 rounded-2xl shadow-md min-h-[120px] border-2 border-dashed border-gray-300 relative transition-all" onDragOver={onDragOverWaiting} onDrop={onDropToWaitingList}>
                     <div className="absolute -top-3 left-6 bg-gray-600 text-white text-xs font-bold px-3 py-1 rounded-full">대기 명단 ({waitingList.length}명)</div>
                     <div className="flex flex-wrap gap-2.5">{waitingList.map(name => (<div key={name} draggable onDragStart={(e) => onDragStartFromWaiting(e, name)} className="bg-blue-50 text-blue-800 px-3 py-1.5 rounded-lg font-bold shadow-sm cursor-grab text-sm border border-blue-200 hover:bg-blue-100 flex items-center gap-1.5"><Hand className="w-3.5 h-3.5 opacity-50" />{cleanName(name)}</div>))}</div>
                  </div>
                )}
              </div>
              {showAdvanced && (
                <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex justify-center items-center p-4 no-print">
                  <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                    <div className="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50"><h3 className="font-bold text-gray-800 flex items-center gap-2"><Settings className="w-5 h-5 text-gray-500" />선생님용 설정</h3><button onClick={() => setShowAdvanced(false)} className="text-gray-400 p-1"><X className="w-5 h-5" /></button></div>
                    <div className="p-5 space-y-5 max-h-[80vh] overflow-y-auto">
                      <div className="bg-rose-50 p-4 rounded-xl border border-rose-100"><label className="text-sm font-bold text-rose-900 block mb-2">🤫 비밀 고정석</label><textarea className="w-full border border-rose-200 rounded-lg p-3 text-sm h-16 resize-none outline-none" placeholder="홍길동: 1-1" value={secretSeatsInput} onChange={(e) => setSecretSeatsInput(e.target.value)} /></div>
                      <div><label className="text-sm font-bold text-gray-700 block mb-2">🚫 강제 기피 대상</label><textarea className="w-full border border-gray-300 rounded-lg p-3 text-sm h-16 resize-none outline-none" placeholder="홍길동-김철수" value={avoidPairs} onChange={(e) => setAvoidPairs(e.target.value)} /></div>
                      <div className="pt-4 border-t border-gray-100"><button onClick={() => { saveCurrentLayout(); setShowAdvanced(false); }} className="w-full py-2.5 mb-3 bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold rounded-lg flex items-center justify-center gap-2 transition-colors shadow-md"><Save className="w-5 h-5" />현재 배치 기록</button>
                        {savedLayouts.length > 0 && <div className="space-y-2 mt-2"><label className="text-xs text-gray-500 font-bold block mb-1">⏱ 이전 기록</label>{savedLayouts.map((saved, idx) => (<button key={idx} onClick={() => { loadLayout(saved); setShowAdvanced(false); }} className="w-full text-left px-3 py-2 text-sm bg-white border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center gap-2 transition-colors"><History className="w-4 h-4 text-gray-400" /><span className="font-medium text-gray-700">{saved.time}</span> 불러오기</button>))}</div>}
                      </div>
                    </div>
                  </div>
                </div>
              )}
              {modal.isOpen && (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-[60] flex justify-center items-center p-4 no-print">
                  <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col"><div className="p-5">
                      <h3 className={`font-bold text-lg mb-2 ${modal.title.includes('⚠️') ? 'text-red-600' : 'text-gray-800'}`}>{modal.title}</h3>
                      <p className="text-sm text-gray-600 whitespace-pre-wrap">{modal.message}</p>
                      {modal.type === 'export' && (
                        <div className="flex flex-col gap-2.5 w-full mt-5">
                          <button onClick={() => handleExport('image')} disabled={isExporting} className="w-full flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-3 rounded-lg font-bold border border-indigo-200 transition-colors">{isExporting ? "⏳ 캡처 중..." : <><ImageIcon className="w-5 h-5" /> 이미지로 저장</>}</button>
                          <button onClick={() => handleExport('pdf')} disabled={isExporting} className="w-full flex items-center justify-center gap-2 bg-red-50 hover:bg-red-100 text-red-700 py-3 rounded-lg font-bold border border-red-200 transition-colors">{isExporting ? "⏳ PDF 변환 중..." : <><FileText className="w-5 h-5" /> PDF로 저장</>}</button>
                          <button onClick={modal.onCancel} disabled={isExporting} className="w-full mt-2 py-2 text-sm font-medium text-gray-500">취소</button>
                        </div>
                      )}
                    </div>
                    {modal.type !== 'export' && (<div className="bg-gray-50 px-4 py-3 flex justify-end gap-2 border-t border-gray-100">{modal.type === 'confirm' && (<button onClick={modal.onCancel} className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">취소</button>)}<button onClick={modal.onConfirm} className="px-4 py-2 text-sm font-medium text-white rounded-lg bg-blue-600 hover:bg-blue-700">확인</button></div>)}
                  </div>
                </div>
              )}
            </div>
          );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <a href="index.html" class="fixed bottom-6 right-6 bg-white shadow-lg border border-gray-200 p-3 rounded-full hover:bg-gray-50 transition-all z-50 flex items-center justify-center group no-print"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600 group-hover:text-blue-600"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></a>
</body>
</html>
