<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 자리바꾸기</title>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #root { min-height: 100vh; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600 mb-4"></div>
                <p class="text-gray-600 font-medium">프로그램을 구성 중입니다...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import React from 'https://esm.sh/react@18';
        import ReactDOM from 'https://esm.sh/react-dom@18/client';

        async function init() {
            try {
                // Fetch the JS file (which contains JSX and CDN imports)
                const response = await fetch('./seating.js');
                if (!response.ok) throw new Error('파일을 불러올 수 없습니다 (seating.js)');
                const code = await response.text();

                // Transform JSX to standard JS using Babel
                const transformed = Babel.transform(code, {
                    presets: ['react'],
                    sourceType: 'module'
                }).code;

                // Create a Blob URL and import it as a module
                const blob = new Blob([transformed], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const { default: App } = await import(url);

                // Render the App
                const container = document.getElementById('root');
                const root = ReactDOM.createRoot(container);
                root.render(React.createElement(App));
                
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error("Initialization Error:", err);
                document.getElementById('root').innerHTML = `
                    <div class="flex flex-col items-center justify-center h-screen p-10 text-center">
                        <h1 class="text-2xl font-bold text-red-600 mb-4">프로그램 로드 실패</h1>
                        <p class="text-gray-600 mb-6">${err.message}</p>
                        <a href="index.html" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors">포털로 돌아가기</a>
                    </div>
                `;
            }
        }

        init();
    </script>
    
    <!-- 뒤로가기 버튼 -->
    <a href="index.html" class="fixed bottom-6 right-6 bg-white shadow-lg border border-gray-200 p-3 rounded-full hover:bg-gray-50 transition-all z-50 flex items-center justify-center group no-print">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600 group-hover:text-blue-600"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    </a>
</body>
</html>
