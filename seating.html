<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 자리배치</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></link>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (JSX 컴파일) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 저장 및 캡처 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white; }
      .seat-grid { gap: 4px !important; }
      /* 인쇄 시 테두리 명확하게 */
      .seat-box { border: 1.5px solid #333 !important; box-shadow: none !important; break-inside: avoid; }
      @page { size: landscape; margin: 1cm; }
    }
    
    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

    /* A4 가로 사이즈 고정 클래스 */
    .a4-landscape {
      width: 1123px;
      min-height: 794px;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    /* ⭐️ 카운트다운 애니메이션 */
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      30% { transform: scale(1.2); opacity: 1; }
      50% { transform: scale(1); opacity: 1; }
      90% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0; }
    }
    .animate-count {
      animation: popIn 1s ease-in-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const App = () => {
      // 상태 관리
      const [inputText, setInputText] = useState("1번 홍길동(남)\n2번 김철수(남)\n3번 이영희(여)\n4번 박민수(남)\n5번 정수진(여)\n6번 최동훈(남)\n7번 강지민(여)\n8번 조현우(남)\n9번 윤서연(여)\n10번 장도윤(남)\n11번 임지아(여)\n12번 한우진(남)\n13번 오유나(여)\n14번 서준서(남)\n15번 신하윤(여)\n16번 권민재(남)\n17번 황서진(여)\n18번 송예준(남)\n19번 전은지(여)\n20번 유현수(남)");
      const [rows, setRows] = useState(5);
      const [cols, setCols] = useState(6);
      const [layoutMode, setLayoutMode] = useState('normal'); 
      
      const [groupRows, setGroupRows] = useState(2);
      const [groupCols, setGroupCols] = useState(2);

      const [grid, setGrid] = useState([]);
      const [fixedSeats, setFixedSeats] = useState({}); 
      const [draggedSeat, setDraggedSeat] = useState(null);
      const [inactiveSeats, setInactiveSeats] = useState({});

      const [showRoster, setShowRoster] = useState(true);
      const [useGenderColor, setUseGenderColor] = useState(false);
      const [modal, setModal] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null, onCancel: null });
      const [showAdvanced, setShowAdvanced] = useState(false);
      const [avoidPairs, setAvoidPairs] = useState("");
      const [genderPairing, setGenderPairing] = useState(false);
      const [savedLayouts, setSavedLayouts] = useState([]);
      
      const [secretSeatsInput, setSecretSeatsInput] = useState("");
      const [prevLayoutText, setPrevLayoutText] = useState("");
      const [isExporting, setIsExporting] = useState(false); 
      const [printPerspective, setPrintPerspective] = useState('normal'); 

      // 하단 안내 문구 관련 상태
      const [footerNote, setFooterNote] = useState("※ 자리는 랜덤 프로그램을 통해 공정하게 배치되었습니다.");
      const [footerFontSize, setFooterFontSize] = useState("text-sm");
      const [footerFontWeight, setFooterFontWeight] = useState("font-medium");
      
      // 발표 모드 및 카운트다운 상태
      const [isPresenting, setIsPresenting] = useState(false);
      const [countdown, setCountdown] = useState(null);

      useEffect(() => {
        const initialGrid = Array(rows).fill(null).map(() => Array(cols).fill(null));
        setGrid(initialGrid);
        setFixedSeats({}); 
        setInactiveSeats({});
      }, [rows, cols]);

      const displayName = (name) => name ? name.replace(/[\s\(\[\-]*(남|여)[\)\]\s]*$/, '').trim() : '';

      const parseStudentName = (rawName) => {
        if (!rawName) return { number: '', name: '' };
        const clean = rawName.replace(/[\s\(\[\-]*(남|여)[\)\]\s]*$/, '').trim();
        const match = clean.match(/^([0-9]+번?)\s*(.*)/);
        if (match) {
          return { number: match[1], name: match[2] || ' ' };
        }
        return { number: '', name: clean };
      };

      const cleanName = (name) => name ? name.replace(/^[0-9]+번?\s*/, '').replace(/[\s\(\[\-]*(남|여)[\)\]\s]*$/, '').trim() : '';
      
      const getGender = (name) => {
        if (!name) return null;
        const match = name.match(/[\s\(\[\-]*(남|여)[\)\]\s]*$/);
        return match ? (match[1] === '남' ? 'M' : 'F') : null;
      };

      const getAvoidsList = () => {
        return avoidPairs.split('\n')
          .map(line => line.split(/[,\-]/).map(n => cleanName(n.trim())).filter(n => n))
          .filter(pair => pair.length >= 2);
      };

      const getPrevPairsList = () => {
        if (!prevLayoutText.trim()) return [];
        const pairs = [];
        let parsedRows = [];

        const rawItems = prevLayoutText.split(/[\t\n\r,]+/)
          .map(item => cleanName(item.trim()))
          .filter(item => item !== "");

        const skipKeywords = ["번호", "이름", "성별", "비고", "성명", "학번", "남", "여"];
        const layoutItems = rawItems.filter(item => {
          if (skipKeywords.includes(item)) return false;
          if (/^\d+$/.test(item)) return false; 
          return true; 
        });

        for (let i = 0; i < layoutItems.length; i += cols) {
          parsedRows.push(layoutItems.slice(i, i + cols));
        }

        const emptyMarkers = ['빈자리', '❌', '제외'];
        for (let i = 0; i < parsedRows.length; i++) {
          for (let j = 0; j < parsedRows[i].length; j++) {
            const current = parsedRows[i][j];
            if (!current || emptyMarkers.includes(current)) continue;

            if (j + 1 < parsedRows[i].length) {
              const right = parsedRows[i][j+1];
              if (right && !emptyMarkers.includes(right)) pairs.push([current, right]);
            }
            if (i + 1 < parsedRows.length) {
              const down = parsedRows[i+1][j];
              if (down && !emptyMarkers.includes(down)) pairs.push([current, down]);
            }
          }
        }
        return pairs;
      };

      const checkConflict = (testGrid, r, c, studentName, targetList, mode, gr, gc) => {
        let strict = false;
        let soft = false;
        if (!studentName || targetList.length === 0) return { strict, soft };
        const clean1 = cleanName(studentName);

        for (let i = 0; i < testGrid.length; i++) {
          for (let j = 0; j < testGrid[i].length; j++) {
            if (i === r && j === c) continue;
            const targetName = testGrid[i][j];
            if (!targetName) continue;
            const clean2 = cleanName(targetName);

            const isMatch = targetList.some(pair => pair.includes(clean1) && pair.includes(clean2));
            if (!isMatch) continue;

            let isSameGroup = false;
            if (mode === 'pair') {
              if (i === r && Math.floor(j / 2) === Math.floor(c / 2)) isSameGroup = true;
            } else if (mode === 'group') {
              if (Math.floor(i / gr) === Math.floor(r / gr) && Math.floor(j / gc) === Math.floor(c / gc)) isSameGroup = true;
            }

            if (isSameGroup) strict = true;
            if (Math.abs(i - r) <= 1 && Math.abs(j - c) <= 1) soft = true;
          }
        }
        return { strict, soft };
      };

      const showAlert = (title, message) => {
        setModal({ isOpen: true, type: 'alert', title, message, onConfirm: () => setModal(prev => ({...prev, isOpen: false})) });
      };

      const showConfirm = (title, message, onConfirm, onCancel) => {
        setModal({
          isOpen: true,
          type: 'confirm',
          title,
          message,
          onConfirm: () => { onConfirm(); setModal(prev => ({...prev, isOpen: false})); },
          onCancel: () => { if(onCancel) onCancel(); setModal(prev => ({...prev, isOpen: false})); }
        });
      };

      const allNamesOriginal = [...new Set(inputText.split(/[,\n]/).map(n => n.trim()).filter(n => n !== ""))];
      const assignedNamesOriginal = grid.flat().filter(n => n !== null);
      const waitingList = allNamesOriginal.filter(n => !assignedNamesOriginal.includes(n));

      // ⭐️ 실제 랜덤 배치를 수행하는 함수 분리 (useSecret 인자 받음)
      const executeAssign = (useSecret) => {
        let names = inputText.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
        const uniqueNames = [...new Set(names)];
        
        const activeSeatCount = (rows * cols) - Object.keys(inactiveSeats).length;

        if (uniqueNames.length > activeSeatCount) {
          showAlert("인원 초과", `자리가 부족합니다!\n(학생수: ${uniqueNames.length}명 / 사용 가능 좌석수: ${activeSeatCount}석)\n행과 열을 늘리거나 숨긴 책상을 복구해 주세요.`);
          return;
        }

        const avoids = getAvoidsList();
        const prevPairs = getPrevPairsList(); 

        const secretSeats = {};
        // ⭐️ useSecret이 true일 때만 비밀 고정석을 불러옵니다.
        if (useSecret && secretSeatsInput.trim()) {
          secretSeatsInput.split('\n').forEach(line => {
            const parts = line.split(':');
            if (parts.length >= 2) {
              const name = cleanName(parts[0].trim());
              const posMatch = parts[1].match(/(\d+)[^\d]+(\d+)/); 
              if (name && posMatch) {
                const r = parseInt(posMatch[1], 10) - 1;
                const c = parseInt(posMatch[2], 10) - 1;
                if (r >= 0 && r < rows && c >= 0 && c < cols) {
                  secretSeats[name] = { r, c };
                }
              }
            }
          });
        }

        let bestGrid = null;
        let minViolations = Infinity;
        const MAX_RETRIES = 500;

        for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
          let newGrid = Array(rows).fill(null).map(() => Array(cols).fill(null));
          let remainingNames = [...uniqueNames];

          Object.entries(secretSeats).forEach(([name, pos]) => {
            const originalName = remainingNames.find(n => cleanName(n) === name);
            if (originalName && pos.r < rows && pos.c < cols && !inactiveSeats[`${pos.r}-${pos.c}`] && newGrid[pos.r][pos.c] === null) {
              newGrid[pos.r][pos.c] = originalName;
              remainingNames = remainingNames.filter(n => n !== originalName);
            }
          });

          Object.entries(fixedSeats).forEach(([name, pos]) => {
            if (remainingNames.includes(name) && pos.r < rows && pos.c < cols && !inactiveSeats[`${pos.r}-${pos.c}`] && newGrid[pos.r][pos.c] === null) {
              newGrid[pos.r][pos.c] = name;
              remainingNames = remainingNames.filter(n => n !== name);
            }
          });

          remainingNames.sort(() => Math.random() - 0.5);

          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (newGrid[r][c] === null && !inactiveSeats[`${r}-${c}`] && remainingNames.length > 0) {
                newGrid[r][c] = remainingNames.pop();
              }
            }
          }

          let violations = 0;
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const studentA = newGrid[r][c];
              if (!studentA) continue;

              const avoidConflict = checkConflict(newGrid, r, c, studentA, avoids, layoutMode, groupRows, groupCols);
              if (avoidConflict.strict) violations += 10000;
              if (avoidConflict.soft) violations += 100;

              const prevConflict = checkConflict(newGrid, r, c, studentA, prevPairs, layoutMode, groupRows, groupCols);
              if (prevConflict.strict) violations += 500; 
              if (prevConflict.soft) violations += 5;     

              if (genderPairing && layoutMode === 'pair') {
                if (c % 2 === 0 && c < cols - 1) {
                  const partner = newGrid[r][c+1];
                  if (partner) {
                    const gA = getGender(studentA);
                    const gB = getGender(partner);
                    if (gA && gB && gA === gB) violations += 10;
                  }
                }
              }
            }
          }

          if (violations === 0) {
            bestGrid = newGrid;
            minViolations = 0;
            break;
          }
          if (violations < minViolations) {
            minViolations = violations;
            bestGrid = newGrid;
          }
        }

        setGrid(bestGrid);
        
        // 발표 모드일 경우 경고창 생략
        if (!isPresenting) {
          if (minViolations >= 10000) {
            showAlert("⚠️ 배치 알림", "공간이 부족하여 '강제 기피 대상'을 다른 조로 완벽히 분리하지 못했습니다. 배치 결과를 확인해 주세요.");
          } else if (minViolations >= 500) {
            showAlert("💡 배치 알림", "강제 기피 대상은 성공적으로 분리되었으나, 자리가 부족해 '이전 짝꿍/모둠'이었던 학생 일부가 다시 같은 조에 배치되었습니다.");
          } else if (minViolations > 0) {
            showAlert("💡 배치 알림", "모든 학생이 다른 조로 분리되었으나, 일부 학생이 이전 짝꿍이나 기피 대상 근처(대각선 등)에 배치되었습니다.");
          }
        }
      };

      // ⭐️ 버튼 클릭 시 카운트다운 및 특수키(Ctrl) 여부 판단
      const handleAssignClick = (e) => {
        if (countdown !== null) return; // 카운트다운 중 중복 클릭 방지

        // 발표 모드가 꺼져있으면 무조건 비밀 고정석 작동
        // 발표 모드 켜져있으면 사용자가 Ctrl(또는 Cmd) 키를 누르고 클릭했을 때만 작동!
        const useSecret = !isPresenting || e.ctrlKey || e.metaKey;

        if (isPresenting && layoutMode !== 'manual') {
          let currentCount = 3;
          setCountdown(currentCount);
          
          const timer = setInterval(() => {
            currentCount--;
            if (currentCount > 0) {
              setCountdown(currentCount);
            } else {
              clearInterval(timer);
              setCountdown(null);
              executeAssign(useSecret);
            }
          }, 1000);
        } else {
          executeAssign(useSecret);
        }
      };

      const handleClear = () => {
        showConfirm("전체 비우기", "모든 자리를 비우시겠습니까?\n(고정석과 책상 배열 정보는 유지됩니다)", () => {
          const emptyGrid = Array(rows).fill(null).map(() => Array(cols).fill(null));
          Object.entries(fixedSeats).forEach(([name, pos]) => {
            if (pos.r < rows && pos.c < cols && !inactiveSeats[`${pos.r}-${pos.c}`]) {
              emptyGrid[pos.r][pos.c] = name;
            }
          });
          setGrid(emptyGrid);
        });
      };

      const toggleFixed = (r, c, name) => {
        if (!name) return;
        setFixedSeats(prev => {
          const newFixed = { ...prev };
          if (newFixed[name]) {
            delete newFixed[name]; 
          } else {
            Object.keys(newFixed).forEach(key => {
                if(newFixed[key].r === r && newFixed[key].c === c) delete newFixed[key];
            });
            newFixed[name] = { r, c };
          }
          return newFixed;
        });
      };

      const toggleInactive = (r, c) => {
        if (grid[r][c] !== null) return; 
        setInactiveSeats(prev => {
          const next = { ...prev };
          if (next[`${r}-${c}`]) delete next[`${r}-${c}`];
          else next[`${r}-${c}`] = true;
          return next;
        });
      };

      const onDragStartFromGrid = (e, r, c, name) => {
        setDraggedSeat({ source: 'grid', r, c, name });
        e.dataTransfer.effectAllowed = "move";
      };

      const onDragStartFromWaiting = (e, name) => {
        setDraggedSeat({ source: 'waiting', name });
        e.dataTransfer.effectAllowed = "move";
      };

      const onDragOverGrid = (e, r, c) => {
        if (inactiveSeats[`${r}-${c}`]) return; 
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
      };

      const onDragOverWaiting = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
      };

      const onDropToGrid = (e, targetR, targetC) => {
        e.preventDefault();
        if (!draggedSeat) return;
        if (inactiveSeats[`${targetR}-${targetC}`]) return; 

        const newGrid = [...grid.map(row => [...row])];
        const avoids = getAvoidsList();
        const prevPairs = getPrevPairsList(); 
        
        let proposedFixedSeats = { ...fixedSeats };
        let hasAvoidConflict = false;
        let hasPrevConflict = false;

        if (draggedSeat.source === 'grid') {
          const sourceR = draggedSeat.r;
          const sourceC = draggedSeat.c;
          if (sourceR === targetR && sourceC === targetC) {
            setDraggedSeat(null);
            return;
          }

          const temp = newGrid[sourceR][sourceC];
          newGrid[sourceR][sourceC] = newGrid[targetR][targetC];
          newGrid[targetR][targetC] = temp;

          const avoidC1 = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], avoids, layoutMode, groupRows, groupCols);
          const avoidC2 = checkConflict(newGrid, sourceR, sourceC, newGrid[sourceR][sourceC], avoids, layoutMode, groupRows, groupCols);
          if (avoidC1.strict || avoidC1.soft || avoidC2.strict || avoidC2.soft) hasAvoidConflict = true;

          const prevC1 = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], prevPairs, layoutMode, groupRows, groupCols);
          const prevC2 = checkConflict(newGrid, sourceR, sourceC, newGrid[sourceR][sourceC], prevPairs, layoutMode, groupRows, groupCols);
          if (prevC1.strict || prevC2.strict) hasPrevConflict = true;

          const nameA = newGrid[sourceR][sourceC];
          const nameB = newGrid[targetR][targetC];
          if(nameA && proposedFixedSeats[nameA]) proposedFixedSeats[nameA] = { r: sourceR, c: sourceC };
          if(nameB && proposedFixedSeats[nameB]) proposedFixedSeats[nameB] = { r: targetR, c: targetC };

        } else if (draggedSeat.source === 'waiting') {
          newGrid[targetR][targetC] = draggedSeat.name;

          const avoidC = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], avoids, layoutMode, groupRows, groupCols);
          if (avoidC.strict || avoidC.soft) hasAvoidConflict = true;

          const prevC = checkConflict(newGrid, targetR, targetC, newGrid[targetR][targetC], prevPairs, layoutMode, groupRows, groupCols);
          if (prevC.strict) hasPrevConflict = true;
        }

        const applyChanges = () => {
          setGrid(newGrid);
          setFixedSeats(proposedFixedSeats);
          setDraggedSeat(null);
        };

        if (isPresenting) {
          applyChanges();
        } else {
          if (hasAvoidConflict) {
            showConfirm(
              "⚠️ 배치 불가 주의!", 
              "해당 위치로 이동하면 [강제 기피 대상]과 같은 조가 되거나 근처에 인접하게 됩니다.\n그래도 배치를 강행하시겠습니까?", 
              applyChanges,
              () => setDraggedSeat(null)
            );
          } else if (hasPrevConflict) {
            showConfirm(
              "💡 이전 자리 중복", 
              "해당 위치로 이동하면 [이전 자리에서 인접했던 학생]과 다시 같은 조가 됩니다.\n이대로 배치하시겠습니까?", 
              applyChanges,
              () => setDraggedSeat(null)
            );
          } else {
            applyChanges();
          }
        }
      };

      const onDropToWaitingList = (e) => {
        e.preventDefault();
        if (!draggedSeat || draggedSeat.source === 'waiting') return;

        const newGrid = [...grid.map(row => [...row])];
        newGrid[draggedSeat.r][draggedSeat.c] = null;
        setGrid(newGrid);

        setFixedSeats(prev => {
           const newFixed = {...prev};
           delete newFixed[draggedSeat.name];
           return newFixed;
        });
        setDraggedSeat(null);
      };

      const handleCopyCurrentToPrev = () => {
        const text = grid.map((row, r) => 
          row.map((name, c) => name ? cleanName(name) : (inactiveSeats[`${r}-${c}`] ? "제외" : "빈자리")).join('\t')
        ).join('\n');
        setPrevLayoutText(text);

        const element = document.getElementById('capture-area');

        hideElements.forEach(el => {

          el.style.display = 'none';

        const printOnlyElements = element.querySelectorAll('.print-only');

        printOnlyElements.forEach(el => {

              windowHeight: element.scrollHeight

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: canvas.width > canvas.height ? 'landscape' : 'portrait', unit: 'px', format: [canvas.width, canvas.height] });
            pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`자리배치도_${new Date().getTime()}.pdf`);
            setModal(prev => ({...prev, isOpen: false}));
            showAlert("저장 완료", "배치도가 PDF 파일로 저장되었습니다.");

          hideElements.forEach((el, idx) => el.style.display = originalDisplays[idx]);

                    <button 
                      onClick={modal.onConfirm}
                      className={`px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-medium text-white rounded-lg transition-colors ${modal.type === 'confirm' ? (modal.title.includes('💡') ? 'bg-amber-500 hover:bg-amber-600' : 'bg-red-600 hover:bg-red-700') : 'bg-blue-600 hover:bg-blue-700'}`}
                    >
                      확인
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ⭐️ 카운트다운 오버레이 */}
          {countdown !== null && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm no-print">
              <div key={countdown} className="text-[10rem] sm:text-[15rem] md:text-[20rem] font-black text-white drop-shadow-2xl animate-count">
                {countdown}
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
